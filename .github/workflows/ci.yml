name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
      WHATSAPP_ACCESS_TOKEN: placeholder-token
      WHATSAPP_PHONE_NUMBER_ID: placeholder-id
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: placeholder-verify
      WHATSAPP_APP_SECRET: placeholder-secret
      RAZORPAY_WEBHOOK_SECRET: placeholder-webhook-secret
      CRON_SECRET: placeholder-cron-secret
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder-redis-token

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
